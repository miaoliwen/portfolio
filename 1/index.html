<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>请假条生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           APPLE DESIGN SYSTEM
           - SF Pro inspired typography with Inter
           - Binary light/dark rhythm
           - Single accent: Apple Blue #0071e3
           - Cinematic whitespace
           ======================================== */
        
        :root {
            /* Apple Color Palette */
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ed;
            --apple-blue-light: #2997ff;
            --link-blue: #0066cc;
            
            /* Backgrounds */
            --bg-black: #000000;
            --bg-light: #f5f5f7;
            --bg-white: #ffffff;
            
            /* Text */
            --text-primary: #1d1d1f;
            --text-secondary: rgba(0, 0, 0, 0.8);
            --text-tertiary: rgba(0, 0, 0, 0.48);
            --text-white: #ffffff;
            --text-white-secondary: rgba(255, 255, 255, 0.8);
            
            /* Surfaces */
            --surface-dark-1: #272729;
            --surface-dark-2: #1d1d1f;
            --surface-light: #fafafc;
            
            /* Shadows */
            --shadow-card: rgba(0, 0, 0, 0.22) 3px 5px 30px 0px;
            --shadow-elevated: rgba(0, 0, 0, 0.15) 0px 10px 40px 0px;
            
            /* Spacing - Apple uses 8px base with granular increments */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
            --space-16: 64px;
            --space-20: 80px;
            
            /* Radius */
            --radius-sm: 5px;
            --radius: 8px;
            --radius-lg: 12px;
            --radius-pill: 980px;
            
            /* Typography */
            --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-text: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            
            /* Transitions */
            --transition: 200ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-text);
            background: var(--bg-black);
            color: var(--text-white);
            line-height: 1.47;
            letter-spacing: -0.374px;
            overflow-x: hidden;
        }

        /* ========================================
           NAVIGATION - Apple Glass Effect
           ======================================== */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 var(--space-5);
        }

        .nav-content {
            max-width: 1024px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-white);
            letter-spacing: -0.224px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: var(--space-6);
        }

        .nav-link {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-white);
            text-decoration: none;
            letter-spacing: -0.12px;
            opacity: 0.8;
            transition: opacity var(--transition);
        }

        .nav-link:hover {
            opacity: 1;
        }

        /* ========================================
           HERO SECTION - Dark
           ======================================== */
        .hero {
            min-height: 100vh;
            background: var(--bg-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: calc(48px + var(--space-12)) var(--space-5) var(--space-16);
            position: relative;
        }

        .hero-badge {
            font-size: 17px;
            font-weight: 500;
            color: var(--apple-blue-light);
            margin-bottom: var(--space-3);
            letter-spacing: -0.374px;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(40px, 8vw, 56px);
            font-weight: 600;
            line-height: 1.07;
            letter-spacing: -0.28px;
            color: var(--text-white);
            margin-bottom: var(--space-3);
            max-width: 800px;
        }

        .hero-subtitle {
            font-size: clamp(19px, 3vw, 21px);
            font-weight: 400;
            line-height: 1.19;
            letter-spacing: 0.231px;
            color: var(--text-white-secondary);
            margin-bottom: var(--space-6);
            max-width: 600px;
        }

        .hero-ctas {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ========================================
           BUTTONS - Apple Style
           ======================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-text);
            font-size: 17px;
            font-weight: 400;
            line-height: 1;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
        }

        .btn-primary {
            background: var(--apple-blue);
            color: var(--text-white);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius);
            min-height: 36px;
        }

        .btn-primary:hover {
            background: var(--apple-blue-hover);
        }

        .btn-pill {
            background: transparent;
            color: var(--apple-blue-light);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-pill);
            border: 1px solid var(--apple-blue-light);
            font-size: 14px;
            letter-spacing: -0.224px;
        }

        .btn-pill:hover {
            text-decoration: underline;
        }

        .btn-pill-filled {
            background: var(--apple-blue);
            color: var(--text-white);
            border: none;
        }

        .btn-pill-filled:hover {
            background: var(--apple-blue-hover);
            text-decoration: none;
        }

        .btn-dark {
            background: var(--surface-dark-2);
            color: var(--text-white);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius);
        }

        .btn-dark:hover {
            background: #2d2d2f;
        }

        /* ========================================
           SECTION - Light (Form Section)
           ======================================== */
        .section-light {
            background: var(--bg-light);
            padding: var(--space-16) var(--space-5);
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--space-10);
        }

        .section-title {
            font-family: var(--font-display);
            font-size: clamp(32px, 5vw, 40px);
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: normal;
            color: var(--text-primary);
            margin-bottom: var(--space-3);
        }

        .section-subtitle {
            font-size: 19px;
            font-weight: 400;
            line-height: 1.47;
            letter-spacing: -0.374px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ========================================
           FORM STYLING
           ======================================== */
        .form-container {
            max-width: 980px;
            margin: 0 auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-10);
        }

        @media (min-width: 1024px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
                gap: var(--space-12);
            }
        }

        .form-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .form-card-header {
            background: var(--surface-light);
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .form-card-title {
            font-family: var(--font-display);
            font-size: 21px;
            font-weight: 600;
            line-height: 1.19;
            letter-spacing: 0.231px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .form-card-title svg {
            width: 22px;
            height: 22px;
            color: var(--apple-blue);
        }

        .form-card-body {
            padding: var(--space-6);
        }

        .form-group {
            margin-bottom: var(--space-5);
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.29;
            letter-spacing: -0.224px;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .form-label .required {
            color: var(--apple-blue);
            margin-left: var(--space-1);
        }

        .form-control {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            border: 1px solid rgba(0, 0, 0, 0.16);
            border-radius: var(--radius);
            font-family: var(--font-text);
            font-size: 17px;
            font-weight: 400;
            line-height: 1.47;
            letter-spacing: -0.374px;
            color: var(--text-primary);
            background: var(--bg-white);
            transition: all var(--transition);
        }

        .form-control::placeholder {
            color: var(--text-tertiary);
        }

        .form-control:hover {
            border-color: rgba(0, 0, 0, 0.32);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-4);
        }

        @media (min-width: 480px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Leave Types */
        .leave-types {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }

        .leave-type-btn {
            padding: var(--space-2) var(--space-4);
            border: 1px solid rgba(0, 0, 0, 0.16);
            background: var(--bg-white);
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-text);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: -0.224px;
            color: var(--text-secondary);
        }

        .leave-type-btn:hover {
            border-color: var(--apple-blue);
            color: var(--apple-blue);
        }

        .leave-type-btn.active {
            background: var(--apple-blue);
            color: var(--text-white);
            border-color: var(--apple-blue);
        }

        .custom-type-input {
            display: none;
            margin-top: var(--space-3);
        }

        .custom-type-input.show {
            display: block;
        }

        /* DateTime Group */
        .datetime-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-2);
            align-items: center;
        }

        @media (min-width: 640px) {
            .datetime-group {
                grid-template-columns: 1fr auto 1fr;
            }
        }

        .datetime-group span {
            color: var(--text-tertiary);
            font-weight: 500;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        @media (min-width: 640px) {
            .datetime-group span {
                display: block;
            }
        }

        /* Duration Display */
        .duration-display {
            background: rgba(0, 113, 227, 0.08);
            border: 1px solid rgba(0, 113, 227, 0.2);
            border-radius: var(--radius);
            padding: var(--space-3) var(--space-4);
            margin-top: var(--space-3);
            display: none;
            align-items: center;
            gap: var(--space-2);
            color: var(--apple-blue);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: -0.224px;
        }

        .duration-display.show {
            display: flex;
        }

        .duration-display svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ========================================
           PREVIEW CARD
           ======================================== */
        .preview-card {
            background: var(--surface-dark-1);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-elevated);
            overflow: hidden;
            position: sticky;
            top: calc(48px + var(--space-6));
        }

        .preview-card-header {
            background: var(--surface-dark-2);
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .preview-card-title {
            font-family: var(--font-display);
            font-size: 21px;
            font-weight: 600;
            line-height: 1.19;
            letter-spacing: 0.231px;
            color: var(--text-white);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .preview-card-title svg {
            width: 22px;
            height: 22px;
            color: var(--apple-blue-light);
        }

        .preview-card-body {
            padding: var(--space-6);
        }

        /* Leave Card Document */
        .leave-card {
            background: linear-gradient(145deg, #2a2a2c 0%, #1f1f21 100%);
            border-radius: var(--radius);
            padding: var(--space-8) var(--space-6);
            font-family: 'Noto Serif SC', Georgia, serif;
            position: relative;
            overflow: hidden;
        }

        .leave-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--apple-blue) 0%, var(--apple-blue-light) 100%);
        }

        .card-header {
            text-align: center;
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 28px;
            font-weight: 400;
            line-height: 1.14;
            letter-spacing: 0.196px;
            color: var(--text-white);
            margin-bottom: var(--space-1);
        }

        .card-subtitle {
            color: var(--text-white-secondary);
            font-size: 12px;
            font-family: var(--font-text);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .card-content {
            line-height: 2;
            color: var(--text-white-secondary);
            font-size: 16px;
        }

        .card-content p {
            margin-bottom: var(--space-3);
            text-indent: 2em;
        }

        .card-salutation {
            margin-bottom: var(--space-3);
            font-weight: 600;
            text-indent: 0 !important;
            color: var(--text-white);
        }

        .card-body {
            margin-bottom: var(--space-6);
        }

        .highlight {
            color: var(--apple-blue-light);
            font-weight: 600;
            border-bottom: 1px solid var(--apple-blue);
            padding: 0 2px;
        }

        .card-footer {
            margin-top: var(--space-8);
            display: flex;
            justify-content: flex-end;
        }

        .signature {
            text-align: right;
            line-height: 2;
            font-size: 15px;
            color: var(--text-white-secondary);
        }

        .signature-line {
            margin-bottom: var(--space-1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--space-12) var(--space-6);
            color: var(--text-white-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: var(--space-4);
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 17px;
            letter-spacing: -0.374px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-6);
        }

        .action-buttons .btn {
            flex: 1;
            min-height: 44px;
        }

        /* ========================================
           MODAL
           ======================================== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2000;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
        }

        @media (min-width: 640px) {
            .modal {
                align-items: center;
                padding: var(--space-5);
            }
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--surface-dark-1);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            width: 100%;
            max-width: 540px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: var(--shadow-elevated);
            animation: slideUp 0.3s ease;
        }

        @media (min-width: 640px) {
            .modal-content {
                border-radius: var(--radius-lg);
                animation: fadeIn 0.3s ease;
            }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--surface-dark-2);
        }

        .modal-header h3 {
            font-family: var(--font-display);
            font-size: 21px;
            font-weight: 600;
            line-height: 1.19;
            letter-spacing: 0.231px;
            color: var(--text-white);
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            font-size: 24px;
            color: var(--text-white);
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all var(--transition);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            padding: var(--space-6);
            overflow-y: auto;
            max-height: calc(90vh - 70px);
        }

        /* Share Options */
        .share-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-3);
            margin-top: var(--space-6);
        }

        .share-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-5) var(--space-3);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
            background: var(--surface-dark-2);
        }

        .share-option:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .share-option svg {
            width: 24px;
            height: 24px;
            color: var(--apple-blue-light);
        }

        .share-option span {
            font-size: 12px;
            color: var(--text-white-secondary);
            font-weight: 500;
            letter-spacing: -0.12px;
        }

        /* Generated Image */
        .generated-image-container {
            text-align: center;
        }

        .generated-image-container img {
            max-width: 100%;
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
        }

        /* ========================================
           LOADING OVERLAY
           ======================================== */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: var(--space-5);
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--apple-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay p {
            color: var(--text-white-secondary);
            font-size: 17px;
            letter-spacing: -0.374px;
        }

        /* ========================================
           TOAST
           ======================================== */
        .toast {
            position: fixed;
            bottom: var(--space-6);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            color: var(--text-white);
            padding: var(--space-3) var(--space-6);
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.224px;
            z-index: 4000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-elevated);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Hidden Canvas */
        .hidden-canvas {
            position: fixed;
            left: -9999px;
            visibility: hidden;
        }

        /* ========================================
           ACCESSIBILITY
           ======================================== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        *:focus-visible {
            outline: 2px solid var(--apple-blue);
            outline-offset: 2px;
        }

        /* High contrast mode */
        @media (prefers-contrast: high) {
            .form-control {
                border-color: rgba(0, 0, 0, 0.5);
            }
            .leave-card {
                border: 1px solid rgba(255, 255, 255, 0.3);
            }
        }

        /* ========================================
           PRINT STYLES
           ======================================== */
        @media print {
            body {
                background: white;
                color: black;
            }
            .nav, .hero, .action-buttons, .form-card {
                display: none;
            }
            .section-light {
                background: white;
                padding: 0;
            }
            .preview-card {
                box-shadow: none;
                border: 1px solid #ccc;
            }
            .leave-card {
                background: white;
                color: black;
                box-shadow: none;
                border: 1px solid #ccc;
            }
            .leave-card::before {
                background: #0071e3;
            }
            .card-title, .card-salutation {
                color: black;
            }
            .card-content, .signature {
                color: #333;
            }
            .highlight {
                color: #0071e3;
                border-color: #0071e3;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-content">
            <a href="#" class="nav-logo">请假条生成器</a>
            <div class="nav-links">
                <a href="#form" class="nav-link">开始制作</a>
                <a href="#preview" class="nav-link">预览</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section - Dark -->
    <section class="hero">
        <div class="hero-badge">专业 · 规范 · 高效</div>
        <h1 class="hero-title">智能请假条生成器</h1>
        <p class="hero-subtitle">一键生成规范、专业的请假条，支持导出图片和文本分享</p>
        <div class="hero-ctas">
            <a href="#form" class="btn btn-primary">开始制作</a>
            <a href="#preview" class="btn btn-pill">查看预览</a>
        </div>
    </section>

    <!-- Form Section - Light -->
    <section class="section-light" id="form">
        <div class="section-header">
            <h2 class="section-title">填写请假信息</h2>
            <p class="section-subtitle">完善以下信息，系统将自动生成规范格式的请假条</p>
        </div>

        <div class="form-container">
            <div class="form-grid">
                <!-- Form Panel -->
                <div class="form-card">
                    <div class="form-card-header">
                        <div class="form-card-title">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            表单信息
                        </div>
                    </div>
                    <div class="form-card-body">
                        <form id="leaveForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">请假人姓名 <span class="required">*</span></label>
                                    <input type="text" class="form-control" id="applicantName" placeholder="请输入您的姓名" required autocomplete="name">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">所属部门</label>
                                    <input type="text" class="form-control" id="department" placeholder="如：技术部" autocomplete="organization">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">审批人姓名 <span class="required">*</span></label>
                                    <input type="text" class="form-control" id="approverName" placeholder="请输入审批人姓名" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">审批人职位</label>
                                    <input type="text" class="form-control" id="approverTitle" placeholder="如：部门经理">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">请假类型 <span class="required">*</span></label>
                                <div class="leave-types">
                                    <button type="button" class="leave-type-btn active" data-type="事假">事假</button>
                                    <button type="button" class="leave-type-btn" data-type="病假">病假</button>
                                    <button type="button" class="leave-type-btn" data-type="年假">年假</button>
                                    <button type="button" class="leave-type-btn" data-type="调休">调休</button>
                                    <button type="button" class="leave-type-btn" data-type="婚假">婚假</button>
                                    <button type="button" class="leave-type-btn" data-type="产假">产假</button>
                                    <button type="button" class="leave-type-btn" data-type="丧假">丧假</button>
                                    <button type="button" class="leave-type-btn" data-type="其他">其他</button>
                                </div>
                                <div class="custom-type-input" id="customTypeInput">
                                    <input type="text" class="form-control" id="customType" placeholder="请输入请假类型">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">请假时间 <span class="required">*</span></label>
                                <div class="datetime-group">
                                    <input type="datetime-local" class="form-control" id="startTime" required>
                                    <span>至</span>
                                    <input type="datetime-local" class="form-control" id="endTime" required>
                                </div>
                                <div class="duration-display" id="durationDisplay">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                    </svg>
                                    <span id="durationText">共计 0 天</span>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">请假事由 <span class="required">*</span></label>
                                <textarea class="form-control" id="leaveReason" placeholder="请详细描述请假原因..." required></textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label">备注（选填）</label>
                                <input type="text" class="form-control" id="remarks" placeholder="其他需要说明的事项">
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Preview Panel -->
                <div class="preview-card" id="preview">
                    <div class="preview-card-header">
                        <div class="preview-card-title">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            实时预览
                        </div>
                    </div>
                    <div class="preview-card-body">
                        <div id="previewContainer">
                            <div class="empty-state">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                                <p>请完善表单信息，预览将自动更新</p>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button type="button" class="btn btn-dark" id="resetBtn">
                                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                </svg>
                                重置
                            </button>
                            <button type="button" class="btn btn-primary" id="generateBtn">
                                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                                生成图片
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Share Modal -->
    <div class="modal" id="shareModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>分享请假条</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="generated-image-container" id="generatedImageContainer">
                    <p style="color: var(--text-white-secondary);">图片生成中...</p>
                </div>
                <div class="share-options">
                    <div class="share-option" id="downloadBtn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        <span>保存图片</span>
                    </div>
                    <div class="share-option" id="copyBtn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                        </svg>
                        <span>复制文本</span>
                    </div>
                    <div class="share-option" id="emailBtn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <span>邮件发送</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>正在生成高清图片...</p>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Hidden Canvas -->
    <canvas id="hiddenCanvas" class="hidden-canvas"></canvas>

    <script src="app.js"></script>
</body>
</html>
